services:
  mongo:
    image: mongo:6.0
    container_name: kkr_mongo
    restart: always
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: kkr_portfolio
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: